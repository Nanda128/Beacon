name: Auto Release on Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  auto-release:
    name: Create or update main-latest release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare release metadata
        id: meta
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          COMMIT_MESSAGE=$(git log -1 --pretty=%B | sed ':a;N;$!ba;s/\n/\\n/g')
          AUTHOR_NAME=$(git log -1 --pretty=%an)
          ISO_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "commit_message=${COMMIT_MESSAGE}" >> "$GITHUB_OUTPUT"
          echo "author_name=${AUTHOR_NAME}" >> "$GITHUB_OUTPUT"
          echo "iso_date=${ISO_DATE}" >> "$GITHUB_OUTPUT"

      - name: Create or update main-latest release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-latest
          name: Beacon main-latest
          body: |
            Automated prerelease for the latest commit on `main`.

            - Commit: `${{ steps.meta.outputs.short_sha }}`
            - Author: `${{ steps.meta.outputs.author_name }}`
            - Date (UTC): `${{ steps.meta.outputs.iso_date }}`
            
            ${{ steps.meta.outputs.commit_message }}
          draft: false
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
